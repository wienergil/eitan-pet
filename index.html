<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🐾 Animal Friends</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
  font-family:'Nunito',sans-serif;
  background: linear-gradient(160deg, #74d7f7 0%, #a8edff 25%, #c8f5c8 65%, #8fdb8f 100%);
  min-height:100vh;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  overflow:hidden; position:relative;
}

/* Clouds */
.cloud { position:absolute; background:white; border-radius:50px; opacity:.75; animation:float linear infinite; }
.cloud::before,.cloud::after { content:''; position:absolute; background:white; border-radius:50%; }
.c1 { width:120px; height:38px; top:7%; left:4%; animation-duration:7s; animation-delay:0s; }
.c1::before { width:55px; height:55px; top:-28px; left:12px; }
.c1::after  { width:40px; height:40px; top:-20px; left:55px; }
.c2 { width:160px; height:50px; top:12%; right:4%; animation-duration:9s; animation-delay:-3s; }
.c2::before { width:70px; height:70px; top:-38px; left:18px; }
.c2::after  { width:55px; height:55px; top:-28px; left:72px; }
.c3 { width:90px; height:30px; top:4%; left:42%; animation-duration:6s; animation-delay:-5s; }
.c3::before { width:44px; height:44px; top:-22px; left:9px; }
.c3::after  { width:33px; height:33px; top:-16px; left:42px; }
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }

.sun {
  position:absolute; top:18px; right:72px;
  width:64px; height:64px;
  background:radial-gradient(circle at 40% 40%, #fff176, #ffd600);
  border-radius:50%;
  box-shadow: 0 0 0 8px rgba(255,214,0,.25), 0 0 0 16px rgba(255,214,0,.12);
  animation:sunpulse 4s ease-in-out infinite;
}
@keyframes sunpulse {
  0%,100%{ box-shadow:0 0 0 8px rgba(255,214,0,.25), 0 0 0 16px rgba(255,214,0,.12); }
  50%    { box-shadow:0 0 0 12px rgba(255,214,0,.3), 0 0 0 24px rgba(255,214,0,.15); }
}

/* Main app */
.app {
  width:100%; max-width:430px;
  padding:14px 18px 22px;
  display:flex; flex-direction:column; align-items:center; gap:14px;
  position:relative; z-index:10;
}

h1 {
  font-family:'Fredoka One',cursive;
  font-size:2.5rem; color:#fff;
  text-shadow: 3px 3px 0 rgba(0,100,50,.5), 0 6px 20px rgba(0,0,0,.15);
  text-align:center; letter-spacing:.5px;
}

/* Progress dots */
.dots { display:flex; gap:7px; align-items:center; flex-wrap:wrap; justify-content:center; max-width:300px; }
.dot {
  width:10px; height:10px; border-radius:50%;
  background:rgba(255,255,255,.45);
  transition:all .3s ease; flex-shrink:0;
}
.dot.on { background:#fff; transform:scale(1.5); box-shadow:0 0 8px rgba(255,255,255,.9); }

/* Card */
.wrap { width:100%; position:relative; height:440px; }

.card {
  width:100%; height:100%;
  border-radius:26px;
  overflow:hidden;
  box-shadow: 0 16px 48px rgba(0,0,0,.22), 0 4px 16px rgba(0,0,0,.1);
  position:absolute; top:0; left:0;
  cursor:grab; user-select:none;
  background:#e8f5e8;
  will-change:transform;
  touch-action:pan-y;
}
.card:active { cursor:grabbing; }
.card.anim { transition:transform .38s cubic-bezier(.25,.46,.45,.94), opacity .38s ease; }
.card.fl  { transform:translateX(-135%) rotate(-14deg) !important; opacity:0; }
.card.fr  { transform:translateX(135%)  rotate(14deg)  !important; opacity:0; }
.card.er  { transform:translateX(125%)  !important; opacity:0; transition:none; }
.card.el  { transform:translateX(-125%) !important; opacity:0; transition:none; }
.card.ec  { transform:translateX(0) !important; opacity:1;
  transition:transform .38s cubic-bezier(.25,.46,.45,.94), opacity .38s ease; }

.card-img {
  width:100%; height:72%;
  object-fit:cover; display:block;
  pointer-events:none;
  background: linear-gradient(135deg, #c8f0c8, #b0e8f0);
  transition: opacity .4s ease;
}
.card-img.loading { opacity: 0; }
.card-img.loaded  { opacity: 1; }

.card-info {
  padding:16px 22px 12px; background:white;
  height:28%;
  display:flex; flex-direction:column; justify-content:center; gap:7px;
  position:relative;
}
.card-info::before {
  content:''; position:absolute; top:0; left:0; right:0;
  height:5px;
  background: var(--accent);
}

.aname {
  font-family:'Fredoka One',cursive;
  font-size:2.1rem; line-height:1;
  color: var(--accent);
}
.afact { font-size:.87rem; color:#555; font-weight:700; line-height:1.4; }

/* Loader spinner inside card */
.spinner {
  position:absolute; top:34%; left:50%; transform:translate(-50%,-50%);
  width:44px; height:44px;
  border:4px solid rgba(255,255,255,.5);
  border-top-color: #56c57a;
  border-radius:50%;
  animation:spin .8s linear infinite;
}
@keyframes spin { to { transform:translate(-50%,-50%) rotate(360deg); } }

/* Sound button */
.sbtn {
  width:100%; padding:19px;
  border-radius:22px; border:none;
  background: linear-gradient(135deg, #4ecb72, #27a355);
  color:white;
  font-family:'Fredoka One',cursive;
  font-size:1.55rem; cursor:pointer;
  box-shadow: 0 7px 0 #1a7a44, 0 10px 24px rgba(39,163,85,.35);
  transition:transform .1s, box-shadow .1s;
  display:flex; align-items:center; justify-content:center; gap:12px;
  letter-spacing:.3px;
}
.sbtn:active { transform:translateY(5px); box-shadow:0 2px 0 #1a7a44; }
.sbtn.playing {
  background:linear-gradient(135deg, #ff8f3f, #e55200);
  box-shadow:0 7px 0 #b33f00, 0 10px 24px rgba(229,82,0,.35);
  animation:wig .35s ease infinite;
}
.sbtn.loading-sound { opacity:.7; cursor:not-allowed; }
@keyframes wig { 0%,100%{transform:rotate(0)} 30%{transform:rotate(-2.5deg)} 70%{transform:rotate(2.5deg)} }

/* Nav */
.nav { display:flex; align-items:center; gap:18px; }
.arr {
  background:rgba(255,255,255,.28); border:2.5px solid rgba(255,255,255,.55);
  border-radius:50%; width:50px; height:50px;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; font-size:1.35rem;
  transition:all .2s; backdrop-filter:blur(6px);
  color:white; font-family:inherit; flex-shrink:0;
}
.arr:hover { background:rgba(255,255,255,.45); transform:scale(1.1); }
.arr:active { transform:scale(.9); }
.hint { color:rgba(255,255,255,.88); font-size:.85rem; font-weight:700; white-space:nowrap; }
</style>
</head>
<body>

<div class="cloud c1"></div>
<div class="cloud c2"></div>
<div class="cloud c3"></div>
<div class="sun"></div>

<div class="app">
  <h1>🐾 Animal Friends</h1>
  <div class="dots" id="dots"></div>
  <div class="wrap"><div class="card" id="card"></div></div>
  <button class="sbtn" id="sbtn" onclick="playSound()">
    🔊 <span id="stxt">Hear Me!</span>
  </button>
  <div class="nav">
    <button class="arr" onclick="go(-1)" aria-label="Previous">◀</button>
    <div class="hint">👈 swipe to explore 👉</div>
    <button class="arr" onclick="go(1)" aria-label="Next">▶</button>
  </div>
</div>

// ─── STATE ───────────────────────────────────────────────────────────────────
let cur = 0, busy = false;
let curAudio = null;
const imgCache = {};   // Wikipedia image URLs
const audioCache = {}; // pre-created Audio objects

// ─── WIKIPEDIA IMAGE FETCH ───────────────────────────────────────────────────
async function fetchWikiImg(wikiTitle) {
  if (imgCache[wikiTitle]) return imgCache[wikiTitle];
  try {
    const url = `https://en.wikipedia.org/w/api.php?action=query&titles=${encodeURIComponent(wikiTitle)}&prop=pageimages&format=json&pithumbsize=800&origin=*`;
    const r = await fetch(url);
    const data = await r.json();
    const page = Object.values(data.query.pages)[0];
    const src = page.thumbnail?.source || '';
    imgCache[wikiTitle] = src;
    return src;
  } catch(e) {
    return '';
  }
}

// Preload next animal's image in background
function preloadNext(idx) {
  const a = animals[(idx + 1) % animals.length];
  const src = a.photoUrl;
  if (src) { const i=new Image(); i.src=src; return; }
  fetchWikiImg(a.wiki).then(src => { if(src) { const i=new Image(); i.src=src; } });
}

// ─── CARD RENDER ─────────────────────────────────────────────────────────────
// SYNC: sets HTML immediately so animation is never interrupted by a mid-flight DOM change
function renderCard(card, idx) {
  const a = animals[idx];
  card.style.setProperty('--accent', a.accent);

  card.innerHTML = `
    <div class="spinner"></div>
    <img class="card-img loading" alt="Real photo of a ${a.name}">
    <div class="card-info">
      <div class="aname">${a.name}</div>
      <div class="afact">${a.fact}</div>
    </div>
  `;

  const imgEl   = card.querySelector('.card-img');
  const spinner = card.querySelector('.spinner');

  function applyImg(src) {
    if (!src) {
      spinner.remove();
      imgEl.style.background = `linear-gradient(135deg, ${a.accent}22, ${a.accent}44)`;
      imgEl.classList.replace('loading','loaded');
      return;
    }
    imgEl.onload  = () => { spinner.remove(); imgEl.classList.replace('loading','loaded'); };
    imgEl.onerror = () => { spinner.remove(); imgEl.classList.replace('loading','loaded'); };
    imgEl.src = src;
  }

  // If we already have the image URL (direct or cached), apply immediately
  if (a.photoUrl) {
    applyImg(a.photoUrl);
  } else if (imgCache[a.wiki]) {
    applyImg(imgCache[a.wiki]);
  } else {
    // Fetch in background — card HTML is already in the DOM, won't interrupt animation
    fetchWikiImg(a.wiki).then(applyImg);
  }

  preloadNext(idx);
}

// ─── DOTS ────────────────────────────────────────────────────────────────────
function buildDots() {
  document.getElementById('dots').innerHTML =
    animals.map((_,i) => `<div class="dot${i===0?' on':''}"></div>`).join('');
}
function updDots() {
  document.querySelectorAll('.dot').forEach((d,i) => d.classList.toggle('on', i===cur));
}

// ─── AUDIO ───────────────────────────────────────────────────────────────────
function getAudio(idx) {
  // Returns an Audio object that tries each URL in order until one works
  if (!audioCache[idx]) {
    const urls = animals[idx].sounds;
    const audio = new Audio();
    let urlIdx = 0;

    const tryNext = () => {
      if (urlIdx < urls.length) {
        audio.src = urls[urlIdx++];
        audio.load();
      }
    };

    audio.onerror = () => {
      // Current URL failed, try next
      tryNext();
    };

    tryNext(); // load first URL
    audioCache[idx] = audio;
  }
  return audioCache[idx];
}

function stopSound() {
  if (curAudio) {
    curAudio.pause();
    curAudio.currentTime = 0;
    curAudio.onended = null;
    curAudio = null;
  }
  const btn = document.getElementById('sbtn');
  btn.classList.remove('playing','loading-sound');
  document.getElementById('stxt').textContent = 'Hear Me!';
}

function playSound() {
  if (curAudio) { stopSound(); return; }

  const a = animals[cur];
  const audio = getAudio(cur);
  const btn   = document.getElementById('sbtn');
  const txt   = document.getElementById('stxt');

  btn.classList.add('playing');
  txt.textContent = `${a.name}! 🎵`;
  curAudio = audio;

  audio.currentTime = 0;

  const p = audio.play();
  if (p) p.catch(() => {
    // Try reloading with first URL
    audio.src = a.sounds[0];
    audio.load();
    audio.play().catch(() => { stopSound(); txt.textContent = 'Tap again!'; });
  });

  audio.onended = stopSound;
}

// ─── NAVIGATE ────────────────────────────────────────────────────────────────
function go(dir) {
  if (busy) return;
  busy = true;
  stopSound();

  const card = document.getElementById('card');
  // Clear any stale inline styles left over from drag so CSS classes drive cleanly
  card.style.transform  = '';
  card.style.transition = '';

  card.classList.add('anim', dir > 0 ? 'fl' : 'fr');

  setTimeout(() => {
    cur = (cur + dir + animals.length) % animals.length;
    updDots();

    // Remove fly-out, position card off the opposite side (no transition)
    card.classList.remove('fl','fr','anim');
    card.style.transform  = '';
    card.style.transition = '';
    card.classList.add(dir > 0 ? 'er' : 'el');

    // Render new content synchronously NOW — before the enter animation fires
    renderCard(card, cur);

    // Double rAF ensures browser has painted the off-screen position before sliding in
    requestAnimationFrame(() => requestAnimationFrame(() => {
      card.classList.add('anim','ec');
      card.classList.remove('er','el');
      setTimeout(() => { card.classList.remove('anim','ec'); busy = false; }, 420);
    }));
  }, 370);
}

// ─── TOUCH / MOUSE SWIPE ─────────────────────────────────────────────────────
const cardEl = document.getElementById('card');
let sx=0, sy=0, dragging=false, dx=0;

function onStart(x,y){ if(busy)return; sx=x; sy=y; dragging=true; dx=0; cardEl.style.transition='none'; }
function onMove(x,y){
  if(!dragging)return;
  const ddx=x-sx, ddy=y-sy;
  if(Math.abs(ddy)>Math.abs(ddx)+18){ dragging=false; cardEl.style.transition=''; return; }
  dx=ddx;
  cardEl.style.transform=`translateX(${dx}px) rotate(${dx*.065}deg)`;
}
function onEnd(){
  if(!dragging)return; dragging=false;
  cardEl.style.transition='';
  if(dx<-60) { cardEl.style.transform=''; go(1); }
  else if(dx>60) { cardEl.style.transform=''; go(-1); }
  else { cardEl.style.transition='transform .3s ease'; cardEl.style.transform=''; setTimeout(()=>cardEl.style.transition='',310); }
}

cardEl.addEventListener('touchstart', e=>onStart(e.touches[0].clientX,e.touches[0].clientY), {passive:true});
cardEl.addEventListener('touchmove',  e=>onMove(e.touches[0].clientX,e.touches[0].clientY),  {passive:true});
cardEl.addEventListener('touchend',   onEnd);
cardEl.addEventListener('mousedown',  e=>{onStart(e.clientX,e.clientY);e.preventDefault();});
document.addEventListener('mousemove',e=>onMove(e.clientX,e.clientY));
document.addEventListener('mouseup',  onEnd);

// ─── KEYBOARD ────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e=>{
  if(e.key==='ArrowRight') go(1);
  if(e.key==='ArrowLeft')  go(-1);
  if(e.key===' '){ e.preventDefault(); playSound(); }
});

// ─── INIT ─────────────────────────────────────────────────────────────────────
buildDots();
renderCard(document.getElementById('card'), 0);

// Pre-warm audio for first animal
getAudio(0);
</script>
</body>
</html>
